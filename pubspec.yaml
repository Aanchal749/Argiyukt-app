name: agriyukt_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Localization & Translation
  flutter_localizations:
    sdk: flutter
  translator: ^1.0.0
  timeago: ^3.6.1
  # 🔴 FIXED: Changed 0.20.2 to 0.19.0 to match flutter_localizations
  intl: ^0.20.2

  # Supabase (Primary Backend)
  supabase_flutter: ^2.8.1

  # UI & Utilities
  google_fonts: ^6.1.0
  pinput: ^4.0.0
  http: ^1.2.0
  image_picker: ^1.2.1
  image_cropper: ^8.0.2
  google_mlkit_text_recognition: ^0.15.0

  # Maps & Location
  geolocator: ^10.1.0
  google_maps_flutter: ^2.14.0
  map_launcher: ^3.1.0
  flutter_polyline_points: ^3.1.0

  # File & Data
  flutter_dotenv: ^6.0.0
  path_provider: ^2.1.5
  csv: ^6.0.0
  provider: ^6.1.2
  shared_preferences: ^2.5.4
  uuid: ^4.2.0
  fl_chart: ^0.66.0
  url_launcher: ^6.3.2
  
  # Payment
  razorpay_flutter: ^1.3.7
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  # ✅ Asset Configuration
  assets:
    - .env # ✅ PROD FIX: Registered the .env file securely
    - assets/data/nashik_villages.csv
    - assets/data/mumbai_villages.csv
    - assets/images/

# Configuration for App Icon
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

# Configuration for Splash Screen
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/logo.png
  android: true
  ios: true